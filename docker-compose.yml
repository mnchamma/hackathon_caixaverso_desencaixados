services:
  postgres:
    image: postgres:16
    container_name: acessibilidade-postgres
    restart: always
    environment:
      POSTGRES_DB: acessibilidade_db
      POSTGRES_USER: acessibilidade_user
      POSTGRES_PASSWORD: acessibilidade_pass
    ports:
      - "5433:5432"
    volumes:
      - acessibilidade_postgres_data:/var/lib/postgresql/data

volumes:
  acessibilidade_postgres_data: